services:
  - type: web
    name: aipostal-api
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: aipostal-db
          property: connectionString
    plan: free

databases:
  - name: aipostal-db
    databaseName: aipostal
    plan: free
